<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Tablero de notas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --paper:#ECE6DA; --chrome:#FBFAF7; --line:#E2DCD0; --ink:#2f2a24; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: var(--ink); background: var(--paper);
    overflow: hidden; -webkit-font-smoothing: antialiased;
  }
  #app { display: flex; flex-direction: column; height: 100vh; width: 100%; }

  header {
    flex: none; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 13px 20px; background: var(--chrome); border-bottom: 1px solid var(--line); z-index: 70;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .logo { width: 26px; height: 26px; border-radius: 7px; background: #FCE181; box-shadow: 0 2px 5px rgba(0,0,0,.16); transform: rotate(-7deg); }
  h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
  .add { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 240px; max-width: 560px; }
  #quick {
    flex: 1; min-width: 0; padding: 10px 14px; border: 1px solid var(--line); border-radius: 10px;
    font-size: 15px; background: #fff; outline: none; font-family: inherit; color: var(--ink);
  }
  button { font-family: inherit; cursor: pointer; }
  .btn-add { flex: none; padding: 10px 16px; border: none; border-radius: 10px; background: var(--ink); color: #fff; font-size: 14px; font-weight: 600; }
  .btn-add:hover { background: #464037; }
  .btn-closed {
    flex: none; display: flex; align-items: center; gap: 8px; padding: 9px 14px;
    border: 1px solid var(--line); border-radius: 10px; background: #fff; color: #46403a; font-size: 14px; font-weight: 600;
  }
  .btn-closed:hover { background: #F4F1EA; }
  #toggleDrawer { margin-left: auto; }
  .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 10px; background: #B6E2A1; color: #2f4a24; font-size: 12px; font-weight: 700; }
  .sync { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 600; color: #9b938a; white-space: nowrap; }
  .sync .dotind { width: 8px; height: 8px; border-radius: 50%; background: #c2bcb2; }
  .sync.cloud { color: #2f6a3a; } .sync.cloud .dotind { background: #57a86a; }
  .sync.local .dotind { background: #c8a13a; }
  .sync.err { color: #9e4136; } .sync.err .dotind { background: #c0584c; }

  #board { position: relative; flex: 1; min-height: 0; overflow: hidden; background: #E4DED2; touch-action: none; }
  #world {
    position: absolute; top: 0; left: 0; width: 4000px; height: 3000px;
    transform-origin: 0 0; cursor: grab;
    background: var(--paper);
    background-image: radial-gradient(rgba(0,0,0,.05) 1.5px, transparent 1.5px);
    background-size: 24px 24px;
    box-shadow: 0 0 0 1px rgba(0,0,0,.04), 0 10px 40px rgba(0,0,0,.06);
  }
  #board.panning #world { cursor: grabbing; }

  .note { position: absolute; width: 200px; cursor: grab; touch-action: none; }
  .note-inner {
    position: relative; width: 100%; min-height: 138px; display: flex; flex-direction: column;
    border-radius: 4px; padding: 16px 15px 16px; color: #3a342b;
    box-shadow: 0 7px 16px rgba(0,0,0,.16), 0 1px 2px rgba(0,0,0,.1);
    font-family: 'Caveat', 'Segoe Print', cursive; font-size: 22px; line-height: 1.3;
    transition: box-shadow .15s ease;
  }
  .note.editing .note-inner { box-shadow: 0 16px 32px rgba(0,0,0,.24), 0 2px 5px rgba(0,0,0,.12); }
  .tape { position: absolute; top: -9px; left: 50%; width: 56px; height: 18px; transform: translateX(-50%) rotate(-2deg); background: rgba(255,255,255,.42); box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .tools { display: none; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; margin: -4px -2px 8px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  .note:hover .tools, .note.editing .tools { display: flex; }
  .dots { display: flex; gap: 5px; }
  .dot { width: 15px; height: 15px; border-radius: 50%; padding: 0; border: 2px solid rgba(255,255,255,.7); box-shadow: 0 1px 1px rgba(0,0,0,.12); cursor: pointer; }
  .dot.sel { border-color: rgba(0,0,0,.45); }
  .acts { display: flex; gap: 5px; }
  .ic { width: 25px; height: 25px; border: none; border-radius: 6px; background: rgba(255,255,255,.55); font-size: 13px; line-height: 1; display: flex; align-items: center; justify-content: center; padding: 0; }
  .ic:hover { background: rgba(255,255,255,.95); }
  .ic.done { color: #2f5a24; } .ic.del { color: #9e4136; }
  .note-text { flex: 1; min-height: 60px; white-space: pre-wrap; word-break: break-word; user-select: none; padding-top: 2px; }
  .note-edit { flex: 1; min-height: 92px; width: 100%; border: none; outline: none; background: transparent; resize: none; font-family: inherit; font-size: inherit; line-height: inherit; color: inherit; padding: 0; margin: 0; }

  .hint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; color: rgba(0,0,0,.30); font-size: 16px; text-align: center; padding: 24px; line-height: 1.6; }

  #zoomctl { position: absolute; left: 16px; bottom: 16px; display: flex; align-items: center; gap: 4px; background: var(--chrome); border: 1px solid var(--line); border-radius: 12px; padding: 5px; box-shadow: 0 4px 14px rgba(0,0,0,.10); z-index: 50; }
  #zoomctl button { border: none; border-radius: 8px; background: transparent; color: #46403a; display: flex; align-items: center; justify-content: center; height: 32px; }
  #zoomctl button:hover { background: #F1EDE5; }
  .zb { width: 32px; font-size: 19px; } #zpct { min-width: 54px; font-size: 13px; font-weight: 600; } .zhome { width: 32px; font-size: 15px; }
  .sep { width: 1px; height: 20px; background: var(--line); margin: 0 2px; }

  #toast { position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 9px 16px; border-radius: 10px; font-size: 13.5px; font-weight: 600; box-shadow: 0 6px 18px rgba(0,0,0,.22); opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease; z-index: 90; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #drawer {
    position: absolute; top: 0; right: 0; height: 100%; width: 330px; max-width: 86%;
    background: var(--chrome); border-left: 1px solid var(--line); box-shadow: -10px 0 30px rgba(0,0,0,.10);
    transform: translateX(102%); transition: transform .3s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column; z-index: 40;
  }
  #drawer.open { transform: translateX(0); }
  .dhead { flex: none; display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 18px 18px 14px; border-bottom: 1px solid var(--paper); }
  .dhead h2 { margin: 0; font-size: 16px; font-weight: 700; }
  .dhead .cnt { font-size: 13px; color: #9b938a; margin-left: 8px; }
  .btn-clear { padding: 6px 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; color: #9e4136; font-size: 12px; font-weight: 600; }
  .btn-clear:hover { background: #FBEEEC; }
  .btn-x { width: 30px; height: 30px; border: none; border-radius: 8px; background: #F1EDE5; color: #6b645b; font-size: 15px; display: flex; align-items: center; justify-content: center; }
  .btn-x:hover { background: #E6E1D8; }
  #closedList { flex: 1; overflow-y: auto; padding: 14px; }
  .citem { display: flex; align-items: flex-start; gap: 10px; padding: 11px 12px; border-radius: 11px; background: #fff; border: 1px solid var(--paper); margin-bottom: 8px; }
  .cswatch { width: 10px; height: 10px; border-radius: 3px; margin-top: 4px; flex: none; }
  .ctext { flex: 1; font-size: 14px; color: #8a837a; text-decoration: line-through; line-height: 1.4; word-break: break-word; }
  .cacts { display: flex; gap: 5px; flex: none; }
  .cbtn { width: 26px; height: 26px; border: none; border-radius: 7px; background: #F1EDE5; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #5b554c; }
  .cbtn:hover { background: #E6E1D8; } .cbtn.del { color: #9e4136; } .cbtn.del:hover { background: #FBEEEC; }
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #b3aca2; font-size: 14px; text-align: center; gap: 8px; padding: 30px 12px; line-height: 1.5; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><div class="logo"></div><h1>Tablero de notas</h1></div>
    <div class="add">
      <input id="quick" placeholder="Escribe una tarea y pulsa Enter…" autocomplete="off" />
      <button class="btn-add" id="addBtn">Añadir</button>
    </div>
    <span class="sync" id="syncStatus" title="Estado de sincronización"><span class="dotind"></span><span id="syncText">…</span></span>
    <button class="btn-closed" id="shareBtn" title="Copiar el enlace de este tablero para abrirlo en otros dispositivos">Compartir</button>
    <button class="btn-closed" id="toggleDrawer"><span>Cerradas</span><span class="badge" id="doneCount">0</span></button>
  </header>

  <main id="board">
    <div id="world"></div>
    <div class="hint" id="hint">Doble clic en el tablero para crear una nota<br/>· Arrastra el fondo para desplazarte · Rueda para zoom ·</div>

    <div id="zoomctl">
      <button class="zb" id="zOut" title="Alejar">−</button>
      <button id="zpct" title="Restablecer zoom">100%</button>
      <button class="zb" id="zIn" title="Acercar">+</button>
      <div class="sep"></div>
      <button class="zhome" id="zHome" title="Centrar / inicio">⌂</button>
    </div>

    <div id="toast"></div>

    <aside id="drawer">
      <div class="dhead">
        <div><h2 style="display:inline">Tareas cerradas</h2><span class="cnt" id="doneCount2">0</span></div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button class="btn-clear" id="clearDone">Vaciar</button>
          <button class="btn-x" id="closeDrawer">✕</button>
        </div>
      </div>
      <div id="closedList"></div>
    </aside>
  </main>
</div>

<!-- Cliente de Supabase (sincronización en la nube). Si no carga, la app sigue funcionando en local. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Tus credenciales de Supabase (rellena config.js). -->
<script src="config.js"></script>
<script>
(function () {
  "use strict";
  var WORLD_W = 4000, WORLD_H = 3000, Z_MIN = 0.4, Z_MAX = 2.5;
  var KEY = "kanban_postits_v1", VKEY = "kanban_view_v1", BKEY = "kanban_board_id";
  var COLORS = ["#FCE181", "#F7B8C8", "#A9D6F2", "#B6E2A1", "#FBC98B", "#CDBDF2"];

  var board = document.getElementById("board");
  var world = document.getElementById("world");
  var quick = document.getElementById("quick");

  // ---------- state ----------
  var notes = load();
  var view = loadView();
  var editingId = null;
  var dragging = false;
  var pendingRender = false;

  // ---------- cloud (Supabase) ----------
  var SB = null, cloudReady = false, lastError = null;
  var boardId = getBoardId();
  function hasConfig() { return !!(window.SUPABASE_URL && window.SUPABASE_ANON_KEY); }
  function initCloud() {
    if (!hasConfig()) { setSync("local", "Local"); return; }
    if (!window.supabase || !window.supabase.createClient) { cloudErr("No cargó la librería (¿bloqueada?)"); return; }
    try {
      SB = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {
        auth: { persistSession: false }
      });
    } catch (e) { cloudErr("Config inválida: " + (e && e.message)); return; }
    setSync("local", "Conectando…");
    cloudLoad();
  }
  function cloudErr(msg) {
    lastError = msg || "error desconocido";
    setSync("err", "Error nube");
    document.getElementById("syncStatus").title = "Error de nube (pulsa para reintentar): " + lastError;
    toast("Nube: " + lastError);
    console.warn("[nube]", lastError);
  }
  function rowToNote(r) { return { id: r.id, text: r.text || "", color: r.color, x: +r.x || 0, y: +r.y || 0, rot: +r.rot || 0, done: !!r.done }; }
  function noteToRow(n) { return { id: n.id, board_id: boardId, text: n.text, color: n.color, x: n.x, y: n.y, rot: n.rot, done: n.done, updated_at: new Date().toISOString() }; }
  function cloudLoad() {
    SB.from("notes").select("*").eq("board_id", boardId).then(function (res) {
      if (res.error) { cloudErr((res.error.message || "") + (res.error.hint ? " · " + res.error.hint : "")); return; }
      cloudReady = true; lastError = null;
      notes = (res.data || []).map(rowToNote);
      save(); render();
      setSync("cloud", "Sincronizado");
      document.getElementById("syncStatus").title = "Sincronizado con la nube";
      subscribeRealtime();
    }, function (err) { cloudErr((err && (err.message || err.toString())) || "fallo de red / CORS"); });
  }
  function cloudUpsert(n) { if (!SB) return; SB.from("notes").upsert(noteToRow(n)).then(function (r) { if (r.error) console.warn("upsert:", r.error.message); }); }
  function cloudDelete(id) { if (!SB) return; SB.from("notes").delete().eq("id", id).eq("board_id", boardId).then(function (r) { if (r.error) console.warn("delete:", r.error.message); }); }
  function subscribeRealtime() {
    try {
      SB.channel("notes-" + boardId)
        .on("postgres_changes", { event: "*", schema: "public", table: "notes", filter: "board_id=eq." + boardId }, applyRemote)
        .subscribe();
    } catch (e) { console.warn("realtime:", e); }
  }
  function applyRemote(payload) {
    if (payload.eventType === "DELETE") {
      var did = payload.old && payload.old.id;
      notes = notes.filter(function (x) { return x.id !== did; });
    } else {
      var n = rowToNote(payload.new), ex = byId(n.id);
      if (ex) {
        // No pisar el texto/posición de una nota que estoy editando en este dispositivo.
        if (editingId === n.id) { ex.color = n.color; ex.done = n.done; }
        else { ex.text = n.text; ex.color = n.color; ex.x = n.x; ex.y = n.y; ex.rot = n.rot; ex.done = n.done; }
      } else { notes.push(n); }
    }
    save(); renderSafe();
  }

  function getBoardId() {
    var m = (location.hash || "").match(/board=([A-Za-z0-9_-]+)/);
    if (m) { try { localStorage.setItem(BKEY, m[1]); } catch (e) {} return m[1]; }
    var s = null; try { s = localStorage.getItem(BKEY); } catch (e) {}
    if (!s) { s = "b" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); try { localStorage.setItem(BKEY, s); } catch (e) {} }
    if ((location.hash || "").indexOf("board=") === -1) { try { history.replaceState(null, "", "#board=" + s); } catch (e) {} }
    return s;
  }
  function setSync(cls, txt) {
    var el = document.getElementById("syncStatus");
    el.className = "sync " + cls;
    document.getElementById("syncText").textContent = txt;
  }
  var toastT = null;
  function toast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(function () { t.classList.remove("show"); }, 1900);
  }

  function load() {
    try { var r = localStorage.getItem(KEY); if (r) { var a = JSON.parse(r); if (Array.isArray(a)) return a; } } catch (e) {}
    return seed();
  }
  function seed() {
    return [
      { id: "s1", text: "¡Hola! Doble clic en el tablero para crear una nota nueva", color: "#FCE181", x: 60, y: 70, rot: -3, done: false },
      { id: "s2", text: "Arrástrame para moverme · clic para editar", color: "#F7B8C8", x: 340, y: 150, rot: 2.5, done: false },
      { id: "s3", text: "Cambia mi color para agrupar ideas por proximidad", color: "#A9D6F2", x: 150, y: 330, rot: -1.5, done: false },
      { id: "s4", text: "Tarea de ejemplo ya completada", color: "#B6E2A1", x: 0, y: 0, rot: 0, done: true }
    ];
  }
  function loadView() {
    try { var r = localStorage.getItem(VKEY); if (r) { var v = JSON.parse(r); if (v && typeof v.zoom === "number") return { panX: v.panX || 0, panY: v.panY || 0, zoom: clamp(v.zoom, Z_MIN, Z_MAX) }; } } catch (e) {}
    return { panX: 40, panY: 30, zoom: 1 };
  }
  function save() { try { localStorage.setItem(KEY, JSON.stringify(notes)); } catch (e) {} }
  function saveView() { try { localStorage.setItem(VKEY, JSON.stringify(view)); } catch (e) {} }

  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function uid() { return "n" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }
  function byId(id) { for (var i = 0; i < notes.length; i++) if (notes[i].id === id) return notes[i]; return null; }

  // ---------- view (pan / zoom) ----------
  function applyView() { world.style.transform = "translate(" + view.panX + "px," + view.panY + "px) scale(" + view.zoom + ")"; document.getElementById("zpct").textContent = Math.round(view.zoom * 100) + "%"; }
  function zoomAt(factor, cx, cy) {
    var z = view.zoom, nz = clamp(z * factor, Z_MIN, Z_MAX);
    if (nz === z) return;
    var wx = (cx - view.panX) / z, wy = (cy - view.panY) / z;
    view.zoom = nz; view.panX = cx - wx * nz; view.panY = cy - wy * nz;
    applyView(); saveView();
  }
  function zoomCentered(factor) { var r = board.getBoundingClientRect(); zoomAt(factor, r.width / 2, r.height / 2); }

  // ---------- render ----------
  function renderSafe() { if (dragging || editingId) { pendingRender = true; } else { render(); } }
  function render() {
    pendingRender = false;
    // active notes
    var active = notes.filter(function (n) { return !n.done; });
    var completed = notes.filter(function (n) { return n.done; });

    world.innerHTML = "";
    active.forEach(function (n) { world.appendChild(noteEl(n)); });

    document.getElementById("hint").style.display = active.length ? "none" : "flex";
    document.getElementById("doneCount").textContent = completed.length;
    document.getElementById("doneCount2").textContent = completed.length;

    var list = document.getElementById("closedList");
    list.innerHTML = "";
    if (!completed.length) {
      var e = document.createElement("div");
      e.className = "empty";
      e.innerHTML = '<div style="font-size:30px;opacity:.6;">✓</div><div>Aún no hay tareas cerradas.<br/>Marca una nota con ✓ para archivarla aquí.</div>';
      list.appendChild(e);
    } else {
      completed.forEach(function (n) { list.appendChild(closedEl(n)); });
    }
  }

  function noteEl(n) {
    var wrap = document.createElement("div");
    wrap.className = "note" + (editingId === n.id ? " editing" : "");
    wrap.style.left = n.x + "px"; wrap.style.top = n.y + "px";
    wrap.dataset.id = n.id;

    var inner = document.createElement("div");
    inner.className = "note-inner";
    inner.style.background = n.color;
    inner.style.transform = "rotate(" + n.rot + "deg)";

    var tape = document.createElement("div"); tape.className = "tape"; inner.appendChild(tape);

    // toolbar
    var tools = document.createElement("div"); tools.className = "tools"; tools.dataset.noDrag = "1";
    var dots = document.createElement("div"); dots.className = "dots";
    COLORS.forEach(function (hex) {
      var d = document.createElement("button");
      d.className = "dot" + (hex === n.color ? " sel" : "");
      d.style.background = hex; d.title = "Cambiar color"; d.dataset.noDrag = "1";
      d.addEventListener("click", function (ev) { ev.stopPropagation(); n.color = hex; save(); cloudUpsert(n); render(); });
      dots.appendChild(d);
    });
    var acts = document.createElement("div"); acts.className = "acts";
    var doneB = mkIc("done", "✓", "Marcar como completada", function () { n.done = true; if (editingId === n.id) editingId = null; save(); cloudUpsert(n); render(); });
    var delB = mkIc("del", "✕", "Eliminar", function () { notes = notes.filter(function (x) { return x.id !== n.id; }); if (editingId === n.id) editingId = null; save(); cloudDelete(n.id); render(); });
    acts.appendChild(doneB); acts.appendChild(delB);
    tools.appendChild(dots); tools.appendChild(acts);
    inner.appendChild(tools);

    if (editingId === n.id) {
      var ta = document.createElement("textarea");
      ta.className = "note-edit"; ta.value = n.text; ta.placeholder = "Escribe…"; ta.dataset.noDrag = "1";
      ta.addEventListener("focus", function () { try { ta.select(); } catch (e) {} });
      ta.addEventListener("keydown", function (ev) {
        if ((ev.key === "Enter" && !ev.shiftKey) || ev.key === "Escape") { ev.preventDefault(); commitEdit(n.id, ta.value); }
      });
      ta.addEventListener("blur", function () { commitEdit(n.id, ta.value); });
      inner.appendChild(ta);
      setTimeout(function () { ta.focus(); }, 0);
    } else {
      var t = document.createElement("div"); t.className = "note-text"; t.textContent = n.text; inner.appendChild(t);
    }

    wrap.appendChild(inner);
    wrap.addEventListener("pointerdown", function (ev) { onNoteDown(ev, n.id); });
    return wrap;
  }

  function mkIc(cls, label, title, fn) {
    var b = document.createElement("button");
    b.className = "ic " + cls; b.textContent = label; b.title = title; b.dataset.noDrag = "1";
    b.addEventListener("click", function (ev) { ev.stopPropagation(); fn(); });
    return b;
  }

  function closedEl(n) {
    var row = document.createElement("div"); row.className = "citem";
    var sw = document.createElement("div"); sw.className = "cswatch"; sw.style.background = n.color;
    var tx = document.createElement("div"); tx.className = "ctext"; tx.textContent = n.text;
    var acts = document.createElement("div"); acts.className = "cacts";
    var r = document.createElement("button"); r.className = "cbtn"; r.textContent = "↩"; r.title = "Restaurar al tablero";
    r.addEventListener("click", function () { n.done = false; save(); cloudUpsert(n); render(); });
    var d = document.createElement("button"); d.className = "cbtn del"; d.textContent = "✕"; d.title = "Eliminar";
    d.addEventListener("click", function () { notes = notes.filter(function (x) { return x.id !== n.id; }); save(); cloudDelete(n.id); render(); });
    acts.appendChild(r); acts.appendChild(d);
    row.appendChild(sw); row.appendChild(tx); row.appendChild(acts);
    return row;
  }

  function commitEdit(id, val) {
    var t = (val || "").trim();
    if (!t) { notes = notes.filter(function (x) { return x.id !== id; }); cloudDelete(id); }
    else { var n = byId(id); if (n) { n.text = t; cloudUpsert(n); } }
    editingId = null; save(); render();
  }

  // ---------- create ----------
  function addNote(text, x, y, edit) {
    var n = { id: uid(), text: text, color: COLORS[notes.length % COLORS.length], x: x, y: y, rot: Math.round((Math.random() * 7 - 3.5) * 10) / 10, done: false };
    notes.push(n); if (edit) editingId = n.id; save(); if (text) cloudUpsert(n); render();
  }
  function spawn(text) {
    var r = board.getBoundingClientRect();
    var cx = (r.width / 2 - view.panX) / view.zoom, cy = (r.height / 2 - view.panY) / view.zoom;
    addNote(text, Math.max(0, Math.round(cx - 100 + (Math.random() * 60 - 30))), Math.max(0, Math.round(cy - 70 + (Math.random() * 60 - 30))), false);
  }

  // ---------- note drag (threshold: move = drag, tap = edit) ----------
  function onNoteDown(e, id) {
    if (e.button != null && e.button !== 0) return;
    if (e.target.closest("[data-no-drag]")) return; // let buttons/textarea work
    e.stopPropagation(); // don't pan
    var el = e.currentTarget, n = byId(id);
    if (!n) return;
    var z = view.zoom, sx = e.clientX, sy = e.clientY, ox = n.x, oy = n.y, moved = false;
    el.style.zIndex = 200; el.style.cursor = "grabbing"; document.body.style.userSelect = "none";
    function move(ev) {
      var dx = (ev.clientX - sx) / z, dy = (ev.clientY - sy) / z;
      if (Math.abs(dx) + Math.abs(dy) > 3) { moved = true; dragging = true; }
      if (moved) el.style.transform = "translate(" + dx + "px," + dy + "px)";
    }
    function up(ev) {
      window.removeEventListener("pointermove", move);
      window.removeEventListener("pointerup", up);
      document.body.style.userSelect = "";
      el.style.cursor = "grab";
      if (moved) {
        var nx = clamp(ox + (ev.clientX - sx) / z, 0, WORLD_W - 200);
        var ny = clamp(oy + (ev.clientY - sy) / z, 0, WORLD_H - 60);
        n.x = Math.round(nx); n.y = Math.round(ny);
        el.style.transform = ""; el.style.left = n.x + "px"; el.style.top = n.y + "px"; el.style.zIndex = "";
        save(); cloudUpsert(n);
        dragging = false;
        if (pendingRender) render();
      } else {
        el.style.zIndex = "";
        editingId = id; render();
      }
    }
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
  }

  // ---------- pan (drag empty board) ----------
  board.addEventListener("pointerdown", function (e) {
    if (e.button != null && e.button !== 0) return;
    if (e.target !== board && e.target !== world) return;
    var spx = view.panX, spy = view.panY, sx = e.clientX, sy = e.clientY, moved = false;
    board.classList.add("panning");
    function move(ev) {
      var dx = ev.clientX - sx, dy = ev.clientY - sy;
      if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
      if (moved) { view.panX = spx + dx; view.panY = spy + dy; applyView(); }
    }
    function up() {
      window.removeEventListener("pointermove", move);
      window.removeEventListener("pointerup", up);
      board.classList.remove("panning");
      if (moved) saveView();
    }
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
  });

  // double-click empty board → new note here
  board.addEventListener("dblclick", function (e) {
    if (e.target !== board && e.target !== world) return;
    var r = board.getBoundingClientRect();
    var x = Math.max(0, Math.round((e.clientX - r.left - view.panX) / view.zoom - 24));
    var y = Math.max(0, Math.round((e.clientY - r.top - view.panY) / view.zoom - 18));
    addNote("", x, y, true);
  });

  // wheel: pan, or zoom with ctrl/cmd (trackpad pinch)
  board.addEventListener("wheel", function (e) {
    e.preventDefault();
    var r = board.getBoundingClientRect();
    if (e.ctrlKey || e.metaKey) {
      zoomAt(Math.exp(-e.deltaY * 0.0015), e.clientX - r.left, e.clientY - r.top);
    } else {
      view.panX -= e.deltaX; view.panY -= e.deltaY; applyView(); saveView();
    }
  }, { passive: false });

  // ---------- header / controls ----------
  function quickAdd() { var v = quick.value.trim(); if (v) { spawn(v); quick.value = ""; } }
  quick.addEventListener("keydown", function (e) { if (e.key === "Enter") quickAdd(); });
  document.getElementById("addBtn").addEventListener("click", quickAdd);

  document.getElementById("shareBtn").addEventListener("click", function () {
    var link = location.origin + location.pathname + "#board=" + boardId;
    var done = function () { toast(hasConfig() ? "Enlace copiado · ábrelo en otros dispositivos" : "Enlace copiado (configura Supabase para sincronizar)"); };
    if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(link).then(done, function () { window.prompt("Copia el enlace de tu tablero:", link); }); }
    else { window.prompt("Copia el enlace de tu tablero:", link); }
  });

  document.getElementById("syncStatus").addEventListener("click", function () {
    if (!SB) { initCloud(); return; }
    if (lastError) { setSync("local", "Reintentando…"); cloudLoad(); }
    else if (lastError === null && cloudReady) { toast("Sincronizado con la nube ☁"); }
  });
  document.getElementById("syncStatus").style.cursor = "pointer";

  var drawer = document.getElementById("drawer");
  document.getElementById("toggleDrawer").addEventListener("click", function () { drawer.classList.toggle("open"); });
  document.getElementById("closeDrawer").addEventListener("click", function () { drawer.classList.remove("open"); });
  document.getElementById("clearDone").addEventListener("click", function () {
    var removed = notes.filter(function (n) { return n.done; });
    notes = notes.filter(function (n) { return !n.done; });
    removed.forEach(function (n) { cloudDelete(n.id); });
    save(); render();
  });

  document.getElementById("zIn").addEventListener("click", function () { zoomCentered(1.2); });
  document.getElementById("zOut").addEventListener("click", function () { zoomCentered(1 / 1.2); });
  document.getElementById("zpct").addEventListener("click", function () { zoomCentered(1 / view.zoom); });
  document.getElementById("zHome").addEventListener("click", function () { view.panX = 40; view.panY = 30; view.zoom = 1; applyView(); saveView(); });

  // ---------- init ----------
  applyView();
  render();
  saveView();
  initCloud();
})();
</script>
</body>
</html>
